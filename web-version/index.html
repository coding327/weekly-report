<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 周报生成器 | 摸鱼神器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 AI 周报生成器</h1>
      <p class="subtitle">输入你干了什么 → AI 帮你写成漂漂亮亮的周报</p>
    </header>

    <main>
      <!-- 输入区 -->
      <section class="input-section">
        <div class="form-group">
          <label for="role">你的岗位</label>
          <input type="text" id="role" placeholder="例：后端开发 / 运营 / 产品经理 / 行政" maxlength="20">
        </div>

        <div class="form-group">
          <label for="keywords">
            这周做了什么
            <span class="tip">（想到什么写什么，不用排版，关键词即可）</span>
          </label>
          <textarea id="keywords" rows="5" placeholder="例：修复了登录bug、跟产品对了新需求、写了3个接口文档、参加了代码评审..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="style">周报风格</label>
            <select id="style">
              <option value="professional">专业正式（适合大厂）</option>
              <option value="casual" selected>简洁干练（通用）</option>
              <option value="detailed">详细汇报（适合向上管理）</option>
              <option value="startup">互联网风格（适合创业公司）</option>
            </select>
          </div>

          <div class="form-group">
            <label for="apiKey">API Key</label>
            <input type="password" id="apiKey" placeholder="输入你的 DeepSeek API Key">
            <span class="tip">
              <a href="https://platform.deepseek.com/api_keys" target="_blank">去 DeepSeek 获取</a>
              （¥1 能用几十次，Key 只存你本地浏览器）
            </span>
          </div>
        </div>

        <button id="generateBtn" class="btn-primary">
          <span class="btn-text">✨ 一键生成周报</span>
          <span class="btn-loading" style="display:none;">生成中...</span>
        </button>

        <div class="api-status" id="apiStatus"></div>
      </section>

      <!-- 输出区 -->
      <section class="output-section" id="outputSection" style="display:none;">
        <div class="output-header">
          <h2>📄 你的周报</h2>
          <div class="output-actions">
            <button id="copyBtn" class="btn-small">📋 一键复制</button>
            <button id="downloadBtn" class="btn-small">💾 下载 TXT</button>
            <button id="regenerateBtn" class="btn-small">🔄 换一版</button>
          </div>
        </div>
        <div class="output-content" id="outputContent"></div>
      </section>
    </main>

    <footer>
      <p>🛡️ API Key 只存在你的浏览器本地 · 不会上传到任何服务器</p>
      <p>Made with ☕ by someone who hates writing 周报</p>
    </footer>
  </div>

  <script src="core.js"></script>
  <script src="script.js"></script>
</body>
</html>
